<html>
    <head>
      <meta charset="utf-8">
      <!-- <meta name="viewport" content="width=device-width, initial-scale=1"> -->
        <!-- <script src="mobi.min.js"></script> -->
        <script src="mobi.js"></script>
        <script>
            function onChange(event) {
              var file = event.target.files[0];
              var reader = new FileReader();
              reader.onload = function(event) {
                var file_content = event.target.result;
                new MobiFile(file_content).render_to("book");
              };
              reader.readAsArrayBuffer(file);
            }


function ajaxLoad(){
    book.innerHTML = '로딩중...';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'Strip_[그리기] 디즈니 만화 그리기.mobi', true);

    xhr.responseType = 'arraybuffer';
    xhr.withCredentials = true;
    xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest'); xhr.setRequestHeader('Access-Control-Allow-Origin', '*');

    // Process the response when the request is ready.
    xhr.onload = function(e) {
      if (this.status == 200) {
        // Create a binary string from the returned data, then encode it as a data URL.
        new MobiFile(this.response).render_to("book");
      }
    };

    xhr.send();
}


        </script>
    </head>
    <body>
    <input type="file" onchange="onChange(event)">
    <a href="javascript:ajaxLoad()">[그리기] 디즈니 만화 그리기</a>
    <div id="book"></div>
    <style type="text/css">
        #book {
            font-family: STFangSong, Helvetica, Arial, Vernada, Tahoma, STXihei, SimSun, Heiti, sans-serif; line-height:150%;
            width: 80%;
            margin: 0 auto;
        }
    </style>
    </body>
</html>
